<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #475569; }
      .label { font: 700 18px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #0f172a; }
      .small { font: 500 13px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #475569; }
      .tiny { font: 500 12px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #64748b; }
      .prod { fill: #ffffff; stroke: #1d4ed8; stroke-width: 2.5; rx: 18; ry: 18; }
      .test { fill: #fffaf0; stroke: #d97706; stroke-width: 2.5; stroke-dasharray: 10 8; rx: 18; ry: 18; }
      .schema { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 18; ry: 18; }
      .arrowBlue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .arrowOrange { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrowOrange); }
      .dash { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 8; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; ry: 14; }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="760"/>

  <text class="title" x="52" y="58">Strategic Signal Scanner · Data Flow</text>
  <text class="subtitle" x="52" y="88">Production flow on top, test flow below. Samples are just saved examples of the cleaned article input.</text>

  <!-- production lane -->
  <text class="label" x="52" y="144">Production flow</text>

  <rect class="prod" x="52" y="176" width="190" height="96"/>
  <text class="label" x="72" y="214">RSS / Web Sources</text>
  <text class="tiny" x="72" y="240">Real articles / feeds</text>

  <rect class="prod" x="282" y="176" width="170" height="96"/>
  <text class="label" x="312" y="214">Fetcher</text>
  <text class="tiny" x="312" y="240">Fetch / clean / dedupe</text>

  <rect class="schema" x="492" y="176" width="230" height="96"/>
  <text class="label" x="518" y="214">Canonical article input</text>
  <text class="tiny" x="518" y="240">title / source / date / url / content</text>

  <rect class="prod" x="762" y="176" width="170" height="96"/>
  <text class="label" x="794" y="214">Analyzer</text>
  <text class="tiny" x="794" y="240">Gemini + rules</text>

  <rect class="prod" x="972" y="176" width="170" height="96"/>
  <text class="label" x="1012" y="214">Report</text>
  <text class="tiny" x="1012" y="240">JSON / markdown</text>

  <path class="arrowBlue" d="M 242 224 C 255 224, 265 224, 282 224"/>
  <path class="arrowBlue" d="M 452 224 C 465 224, 475 224, 492 224"/>
  <path class="arrowBlue" d="M 722 224 C 735 224, 745 224, 762 224"/>
  <path class="arrowBlue" d="M 932 224 C 945 224, 955 224, 972 224"/>

  <!-- sample lane -->
  <line class="dash" x1="52" y1="336" x2="1388" y2="336"/>
  <text class="label" x="52" y="378">Test flow</text>

  <rect class="test" x="52" y="410" width="220" height="110"/>
  <text class="label" x="72" y="448">Sample JSON</text>
  <text class="tiny" x="72" y="472">input + expected + note</text>
  <text class="tiny" x="72" y="494">Saved examples for replay</text>

  <rect class="chip" x="312" y="426" width="250" height="78"/>
  <text class="label" x="334" y="458">signal_replay.py</text>
  <text class="tiny" x="334" y="482">mock / print-prompt / gemini</text>

  <rect class="schema" x="612" y="410" width="230" height="110"/>
  <text class="label" x="638" y="448">Same article input</text>
  <text class="tiny" x="638" y="472">The sample input matches</text>
  <text class="tiny" x="638" y="494">the production canonical schema</text>

  <rect class="chip" x="882" y="426" width="170" height="78"/>
  <text class="label" x="912" y="458">Compare</text>
  <text class="tiny" x="912" y="482">expected vs actual</text>

  <rect class="chip" x="1092" y="426" width="236" height="78"/>
  <text class="label" x="1116" y="458">Calibration result</text>
  <text class="tiny" x="1116" y="482">Adjust prompt / rules / model</text>

  <path class="arrowOrange" d="M 272 465 C 285 465, 295 465, 312 465"/>
  <path class="arrowOrange" d="M 562 465 C 575 465, 590 465, 612 465"/>
  <path class="arrowOrange" d="M 842 465 C 855 465, 865 465, 882 465"/>
  <path class="arrowOrange" d="M 1052 465 C 1065 465, 1075 465, 1092 465"/>

  <!-- bridge note -->
  <rect x="52" y="574" width="1320" height="112" rx="20" ry="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="label" x="76" y="612">How samples relate to RSS / Web Sources</text>
  <text class="small" x="76" y="638">A sample is simply one cleaned article record saved as JSON. In production, Fetcher turns real RSS / web articles into the same schema.</text>
  <text class="small" x="76" y="662">So the sample is the testing version of the production input. The only extra fields are expected and note, which help us evaluate quality locally.</text>

  <rect class="chip" x="1080" y="586" width="270" height="78"/>
  <text class="label" x="1102" y="618">Production input</text>
  <text class="tiny" x="1102" y="642">No expected / note</text>
  <text class="tiny" x="1102" y="662">Just the article schema</text>
</svg>
