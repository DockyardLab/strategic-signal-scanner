<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1360" viewBox="0 0 1800 1360" role="img" aria-labelledby="title desc">
  <title id="title">How the Signal Scanner becomes a Signal Archive Agent</title>
  <desc id="desc">A layered diagram showing the current scanner pipeline, the archive browsing layer, and the final agentic layer that schedules, learns, and recommends.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf4e7"/>
      <stop offset="100%" stop-color="#f1e4cf"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef9f0"/>
      <stop offset="100%" stop-color="#d9f0df"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#dae8fb"/>
    </linearGradient>
    <linearGradient id="panelAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6e9"/>
      <stop offset="100%" stop-color="#ffe4bf"/>
    </linearGradient>
    <linearGradient id="footer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f6ead7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7c5a46" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#9a6447"/>
    </marker>
    <style>
      .title { font: 800 36px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#753c2a; letter-spacing:-.02em; }
      .subtitle { font: 500 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#8e5b47; }
      .section { font: 800 23px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#753c2a; }
      .small { font: 500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#8e5b47; }
      .box-title { font: 800 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#3f2a1f; }
      .box-text { font: 500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#5c4a41; }
      .chip { font: 700 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#7a402c; letter-spacing:.02em; }
      .foot-title { font: 800 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#753c2a; }
      .foot-step { font: 700 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#753c2a; }
      .foot-body { font: 500 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#735145; }
      .panel { rx: 26; ry: 26; filter:url(#shadow); stroke:#e5cdb2; stroke-width:1.2; }
      .node { rx: 18; ry: 18; stroke:#ddc4a8; stroke-width:1; }
      .arrow { stroke:#9a6447; stroke-width:2.4; fill:none; marker-end:url(#arrow); }
      .dash { stroke-dasharray:8 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1360" fill="url(#bg)"/>

  <text x="80" y="74" class="title">Signal Scanner → Archive → Signal Archive Agent</text>
  <text x="80" y="110" class="subtitle">First the system finds and scores signals. Then it makes them browsable. Finally it learns to schedule, prune, and recommend on its own.</text>

  <!-- Panels -->
  <rect x="70" y="150" width="520" height="735" class="panel" fill="url(#panelGreen)"/>
  <rect x="640" y="150" width="520" height="735" class="panel" fill="url(#panelBlue)"/>
  <rect x="1210" y="150" width="520" height="735" class="panel" fill="url(#panelAmber)"/>

  <text x="100" y="196" class="section">1. Current scanner</text>
  <text x="100" y="224" class="small">Already working today: a deterministic pipeline that finds, scores, and renders signals.</text>

  <text x="670" y="196" class="section">2. Archive layer</text>
  <text x="670" y="224" class="small">The browsing layer that turns daily reports into a real archive with memory.</text>

  <text x="1240" y="196" class="section">3. Signal Archive Agent</text>
  <text x="1240" y="224" class="small">The final form: a system that chooses, schedules, learns, and suggests next actions.</text>

  <!-- Left column nodes -->
  <rect x="100" y="260" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="124" y="294" class="box-title">Ingest</text>
  <text x="124" y="320" class="box-text">RSS / Web / YouTube front / FeedX / Podcasts</text>
  <text x="124" y="346" class="box-text">state.json dedupe + refresh windows already in place</text>

  <rect x="100" y="390" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="124" y="424" class="box-title">Score</text>
  <text x="124" y="450" class="box-text">Gemini scores each item and keeps the high-signal ones</text>
  <text x="124" y="476" class="box-text">`relevance_score`, `signal_type`, `reason`, `signal`</text>

  <rect x="100" y="520" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="124" y="554" class="box-title">Render</text>
  <text x="124" y="580" class="box-text">HTML report with clickable cards and “查看与我方业务相关性”</text>
  <text x="124" y="606" class="box-text">Long Table style, paper beige, calm red ink</text>

  <rect x="100" y="650" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="124" y="684" class="box-title">Special inputs</text>
  <text x="124" y="710" class="box-text">YouTube transcript, FeedX, builder X, official blogs</text>
  <text x="124" y="736" class="box-text">All get converted into the same canonical raw format</text>

  <rect x="100" y="780" width="460" height="72" class="node" fill="#ffffff"/>
  <text x="124" y="814" class="box-text">What it already does: “give me a link, I score it, I show you the result.”</text>

  <!-- Middle column nodes -->
  <rect x="670" y="260" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="694" y="294" class="box-title">Archive index</text>
  <text x="694" y="320" class="box-text">One landing page for dates, recent three runs, and topic shortcuts</text>
  <text x="694" y="346" class="box-text">It becomes the memory of the scanner</text>

  <rect x="670" y="390" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="694" y="424" class="box-title">Daily report pages</text>
  <text x="694" y="450" class="box-text">Each day is a standalone HTML report</text>
  <text x="694" y="476" class="box-text">The user can jump from index → day → item → source</text>

  <rect x="670" y="520" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="694" y="554" class="box-title">Drilldown</text>
  <text x="694" y="580" class="box-text">One click to see “what it says / why it matters / what to do”</text>
  <text x="694" y="606" class="box-text">No need to narrate; the page tells the story itself</text>

  <rect x="670" y="650" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="694" y="684" class="box-title">Source memory</text>
  <text x="694" y="710" class="box-text">Remember which feeds are stale, strong, weak, or too repetitive</text>
  <text x="694" y="736" class="box-text">Promote good sources; demote or drop noisy ones</text>

  <rect x="670" y="780" width="460" height="72" class="node" fill="#ffffff"/>
  <text x="694" y="814" class="box-text">What archive adds: “I can come back later, and I can compare across days.”</text>

  <!-- Right column nodes -->
  <rect x="1240" y="260" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="1264" y="294" class="box-title">Scheduler</text>
  <text x="1264" y="320" class="box-text">Cloud Run Job + Cloud Scheduler, ideally Tue / Fri</text>
  <text x="1264" y="346" class="box-text">Runs itself without you starting it manually</text>

  <rect x="1240" y="390" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="1264" y="424" class="box-title">Policy layer</text>
  <text x="1264" y="450" class="box-text">Decide what to keep, what to hide, and what to re-score</text>
  <text x="1264" y="476" class="box-text">Age, source strength, and score all feed the policy</text>

  <rect x="1240" y="520" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="1264" y="554" class="box-title">Action layer</text>
  <text x="1264" y="580" class="box-text">Suggest what Rosy should look at first</text>
  <text x="1264" y="606" class="box-text">Produce “today’s top three” and a next-step hint</text>

  <rect x="1240" y="650" width="460" height="108" class="node" fill="#ffffff"/>
  <text x="1264" y="684" class="box-title">Feedback loop</text>
  <text x="1264" y="710" class="box-text">Use Rosy’s reactions to improve source ranking and thresholds</text>
  <text x="1264" y="736" class="box-text">The system learns which builders / topics matter most</text>

  <rect x="1240" y="780" width="460" height="72" class="node" fill="#ffffff"/>
  <text x="1264" y="814" class="box-text">What Agent adds: “I don’t just archive; I operate the archive.”</text>

  <!-- Arrows between panels -->
  <path class="arrow" d="M 560 314 C 598 314, 608 314, 640 314"/>
  <path class="arrow" d="M 560 444 C 598 444, 608 444, 640 444"/>
  <path class="arrow" d="M 560 574 C 598 574, 608 574, 640 574"/>
  <path class="arrow" d="M 560 704 C 598 704, 608 704, 640 704"/>

  <path class="arrow" d="M 1120 314 C 1158 314, 1168 314, 1210 314"/>
  <path class="arrow" d="M 1120 444 C 1158 444, 1168 444, 1210 444"/>
  <path class="arrow" d="M 1120 574 C 1158 574, 1168 574, 1210 574"/>
  <path class="arrow" d="M 1120 704 C 1158 704, 1168 704, 1210 704"/>

  <!-- Bottom evolution path -->
  <rect x="70" y="940" width="1660" height="350" class="panel" fill="url(#footer)"/>
  <text x="100" y="988" class="foot-title">How the scanner grows into an Agent</text>
  <text x="100" y="1017" class="small">The transition is not a rewrite. It is a set of controlled upgrades on top of the current system.</text>

  <rect x="100" y="1058" width="240" height="78" class="node" fill="#ecfdf5"/>
  <text x="122" y="1084" class="foot-step">Step 1 · Deterministic pipeline</text>
  <text x="122" y="1108" class="foot-body">Capture → score → report</text>
  <text x="122" y="1129" class="foot-body">This is already working</text>

  <rect x="360" y="1058" width="240" height="78" class="node" fill="#eff6ff"/>
  <text x="382" y="1084" class="foot-step">Step 2 · Archive memory</text>
  <text x="382" y="1108" class="foot-body">Keep every day as a browsable page</text>
  <text x="382" y="1129" class="foot-body">Index + day + item drilldown</text>

  <rect x="620" y="1058" width="240" height="78" class="node" fill="#fff7ed"/>
  <text x="642" y="1084" class="foot-step">Step 3 · Scheduled runs</text>
  <text x="642" y="1108" class="foot-body">Cloud Run + Scheduler</text>
  <text x="642" y="1129" class="foot-body">Run on Tue / Fri automatically</text>

  <rect x="880" y="1058" width="240" height="78" class="node" fill="#f8fafc"/>
  <text x="902" y="1084" class="foot-step">Step 4 · Source governance</text>
  <text x="902" y="1108" class="foot-body">Remember what is stale or strong</text>
  <text x="902" y="1129" class="foot-body">Tune feeds without manual babysitting</text>

  <rect x="1140" y="1058" width="240" height="78" class="node" fill="#f8fafc"/>
  <text x="1162" y="1084" class="foot-step">Step 5 · Recommendation</text>
  <text x="1162" y="1108" class="foot-body">Tell Rosy what to read first</text>
  <text x="1162" y="1129" class="foot-body">Surface top three + next action</text>

  <rect x="1400" y="1058" width="300" height="78" class="node" fill="#f8fafc"/>
  <text x="1422" y="1084" class="foot-step">Step 6 · True Agent</text>
  <text x="1422" y="1108" class="foot-body">It operates the archive for you</text>
  <text x="1422" y="1129" class="foot-body">Schedules, filters, remembers, recommends</text>

  <path class="arrow dash" d="M 340 1097 C 348 1097, 352 1097, 360 1097"/>
  <path class="arrow dash" d="M 600 1097 C 608 1097, 612 1097, 620 1097"/>
  <path class="arrow dash" d="M 860 1097 C 868 1097, 872 1097, 880 1097"/>
  <path class="arrow dash" d="M 1120 1097 C 1128 1097, 1132 1097, 1140 1097"/>
  <path class="arrow dash" d="M 1380 1097 C 1388 1097, 1392 1097, 1400 1097"/>

  <text x="100" y="1238" class="small">Final definition: <tspan font-weight="800">Signal Archive Agent</tspan> = a system that continuously collects high-signal inputs, scores them, archives them, and then uses memory + scheduling + feedback to decide what Rosy should see next.</text>
  <text x="100" y="1268" class="small">In short: Scanner finds signals. Archive remembers them. Agent keeps the whole loop alive.</text>
</svg>
