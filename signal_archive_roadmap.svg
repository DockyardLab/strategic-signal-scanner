<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">Strategic Signal Scanner Archive Roadmap</title>
  <desc id="desc">Current completed workflow, archive target, and remaining steps to build a browsable daily archive.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf3"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 800 34px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .subtitle { font: 500 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#475569; }
      .section { font: 800 24px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .small { font: 500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#475569; }
      .label { font: 700 15px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .body { font: 500 15px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#334155; }
      .chip { font: 700 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#1e293b; letter-spacing:.02em; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill:#334155; }
      .panel { rx: 24; ry: 24; filter:url(#shadow); stroke:#dbe5f4; stroke-width:1.2; }
      .node { rx: 18; ry: 18; stroke:#cbd5e1; stroke-width:1; }
      .node-title { font: 800 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .node-text { font: 500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#334155; }
      .arrow { stroke:#64748b; stroke-width:2.2; fill:none; marker-end:url(#arrowhead); }
      .dash { stroke-dasharray:8 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8.2" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1180" fill="url(#bg)"/>

  <text x="80" y="72" class="title">Strategic Signal Scanner · Current State &amp; Archive Roadmap</text>
  <text x="80" y="108" class="subtitle">What is already done, what is still missing, and how the daily HTML archive should feel: today / yesterday / day before, each clickable.</text>

  <!-- Completed -->
  <rect x="70" y="150" width="500" height="720" class="panel" fill="url(#green)"/>
  <text x="100" y="196" class="section">Already done</text>
  <text x="100" y="224" class="small">Working pipeline, scoring, and a single-day HTML report already exist.</text>

  <rect x="100" y="260" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="124" y="292" class="node-title">1. Ingest</text>
  <text x="124" y="318" class="node-text">RSS / Web sources, YouTube front, podcast groups, state.json dedupe</text>
  <text x="124" y="344" class="mono">capture_and_score.py · rss_capture.py</text>

  <rect x="100" y="392" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="124" y="424" class="node-title">2. YouTube bridge</text>
  <text x="124" y="450" class="node-text">youtube-transcript → youtube_to_raw.py → standard raw item</text>
  <text x="124" y="476" class="mono">youtube_front · AJ Karpathy report</text>

  <rect x="100" y="524" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="124" y="556" class="node-title">3. Score</text>
  <text x="124" y="582" class="node-text">Gemini scoring, 3+ filtering, source / type / score ranking</text>
  <text x="124" y="608" class="mono">score_raw_rss.py · gemini-3.1-flash-lite-preview</text>

  <rect x="100" y="656" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="124" y="688" class="node-title">4. Current report</text>
  <text x="124" y="714" class="node-text">Clickable HTML report with “打开 Report · 查看与我方业务相关性”</text>
  <text x="124" y="740" class="mono">build_report.py · report_YYYY-MM-DD.html</text>

  <rect x="100" y="788" width="440" height="60" class="node" fill="#ffffff"/>
  <text x="124" y="825" class="body">Skills already absorbed: markdown-to-html, infographic, slide-deck, doc-coauthoring, youtube-transcript</text>

  <!-- Target archive -->
  <rect x="650" y="150" width="500" height="720" class="panel" fill="url(#blue)"/>
  <text x="680" y="196" class="section">Archive target</text>
  <text x="680" y="224" class="small">A browsable daily archive that lets you jump across days and drill into one item at a time.</text>

  <rect x="680" y="260" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="704" y="292" class="node-title">A. Archive index</text>
  <text x="704" y="318" class="node-text">One landing page listing dates: today, yesterday, day before</text>
  <text x="704" y="344" class="mono">archive/index.html</text>

  <rect x="680" y="392" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="704" y="424" class="node-title">B. Daily pages</text>
  <text x="704" y="450" class="node-text">Each day becomes one report page with its own score, cards, and links</text>
  <text x="704" y="476" class="mono">archive/2026-05-07.html</text>

  <rect x="680" y="524" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="704" y="556" class="node-title">C. Drilldown</text>
  <text x="704" y="582" class="node-text">Click a card → see why it matters → open original source</text>
  <text x="704" y="608" class="mono">#item-01 · /item/01.html</text>

  <rect x="680" y="656" width="440" height="110" class="node" fill="#ffffff"/>
  <text x="704" y="688" class="node-title">D. Cross-day navigation</text>
  <text x="704" y="714" class="node-text">Prev / next / date picker so you can walk the archive chronologically</text>
  <text x="704" y="740" class="mono">today · yesterday · day before</text>

  <rect x="680" y="788" width="440" height="60" class="node" fill="#ffffff"/>
  <text x="704" y="825" class="body">Desired feel: one click into a date, one click into a story, one click back to source.</text>

  <!-- Pending -->
  <rect x="1230" y="150" width="500" height="720" class="panel" fill="url(#amber)"/>
  <text x="1260" y="196" class="section">Still missing</text>
  <text x="1260" y="224" class="small">These are the steps needed to turn the current report into a real archive.</text>

  <rect x="1260" y="260" width="440" height="92" class="node" fill="#ffffff"/>
  <text x="1284" y="292" class="node-title">1. Save every day consistently</text>
  <text x="1284" y="318" class="node-text">Keep raw / scored / report files for each date in a stable folder layout</text>

  <rect x="1260" y="372" width="440" height="92" class="node" fill="#ffffff"/>
  <text x="1284" y="404" class="node-title">2. Generate archive index</text>
  <text x="1284" y="430" class="node-text">Create a landing page that lists dates and highlights high-signal days</text>

  <rect x="1260" y="484" width="440" height="92" class="node" fill="#ffffff"/>
  <text x="1284" y="516" class="node-title">3. Build daily pages automatically</text>
  <text x="1284" y="542" class="node-text">Turn each scored_YYYY-MM-DD.json into a standalone browsable HTML page</text>

  <rect x="1260" y="596" width="440" height="92" class="node" fill="#ffffff"/>
  <text x="1284" y="628" class="node-title">4. Add item drilldown</text>
  <text x="1284" y="654" class="node-text">Expand one item into “what it says / why it matters / what to do next”</text>

  <rect x="1260" y="708" width="440" height="92" class="node" fill="#ffffff"/>
  <text x="1284" y="740" class="node-title">5. Add navigation &amp; filter</text>
  <text x="1284" y="766" class="node-text">Search by source, score, topic; move across dates without leaving the archive</text>

  <rect x="1260" y="820" width="440" height="36" class="node" fill="#ffffff"/>
  <text x="1284" y="844" class="node-text">Optional later: public share link, tags, source pages, weekly rollups</text>

  <!-- Flow arrows -->
  <path class="arrow" d="M 550 315 C 590 315, 610 315, 650 315"/>
  <path class="arrow" d="M 550 447 C 590 447, 610 447, 650 447"/>
  <path class="arrow" d="M 550 579 C 590 579, 610 579, 650 579"/>
  <path class="arrow" d="M 550 711 C 590 711, 610 711, 650 711"/>

  <path class="arrow dash" d="M 1150 315 C 1190 315, 1210 315, 1230 315"/>
  <path class="arrow dash" d="M 1150 447 C 1190 447, 1210 447, 1230 447"/>
  <path class="arrow dash" d="M 1150 579 C 1190 579, 1210 579, 1230 579"/>
  <path class="arrow dash" d="M 1150 711 C 1190 711, 1210 711, 1230 711"/>

  <!-- Bottom roadmap -->
  <rect x="70" y="920" width="1660" height="190" class="panel" fill="#ffffff"/>
  <text x="100" y="965" class="section">Suggested next implementation order</text>
  <text x="100" y="994" class="small">The archive is the missing layer on top of the current daily report. Build it in this order:</text>

  <rect x="100" y="1030" width="250" height="56" class="node" fill="#ecfdf5"/>
  <text x="122" y="1054" class="label">Step 1</text>
  <text x="122" y="1077" class="body">Persist daily outputs cleanly</text>

  <rect x="370" y="1030" width="250" height="56" class="node" fill="#eff6ff"/>
  <text x="392" y="1054" class="label">Step 2</text>
  <text x="392" y="1077" class="body">Generate archive index</text>

  <rect x="640" y="1030" width="250" height="56" class="node" fill="#fff7ed"/>
  <text x="662" y="1054" class="label">Step 3</text>
  <text x="662" y="1077" class="body">Generate day pages</text>

  <rect x="910" y="1030" width="250" height="56" class="node" fill="#f8fafc"/>
  <text x="932" y="1054" class="label">Step 4</text>
  <text x="932" y="1077" class="body">Add drilldown per item</text>

  <rect x="1180" y="1030" width="250" height="56" class="node" fill="#f8fafc"/>
  <text x="1202" y="1054" class="label">Step 5</text>
  <text x="1202" y="1077" class="body">Add date navigation &amp; filters</text>

  <rect x="1450" y="1030" width="250" height="56" class="node" fill="#f8fafc"/>
  <text x="1472" y="1054" class="label">Step 6</text>
  <text x="1472" y="1077" class="body">Optional weekly / source views</text>

</svg>
