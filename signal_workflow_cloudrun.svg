<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="55%" stop-color="#f6efdf"/>
      <stop offset="100%" stop-color="#efe3cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#6e5b41" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #2f3a3f; }
      .sub { font: 500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #66717a; }
      .boxTitle { font: 700 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #2f3a3f; }
      .boxText { font: 500 15px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #51606a; }
      .boxSmall { font: 500 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #7a6e60; }
      .chip { font: 700 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #4f6f8f; }
      .panel { fill: rgba(255,250,241,0.95); stroke: #e5d7c3; stroke-width: 1.2; }
      .panelStrong { fill: #fffaf3; stroke: #e5d7c3; stroke-width: 1.2; }
      .panelSoft { fill: rgba(255,255,255,0.65); stroke: #e7d9c5; stroke-width: 1.1; }
      .accentBlue { fill: #e6eff7; stroke: #bfd0e0; stroke-width: 1.2; }
      .accentGreen { fill: #edf5ea; stroke: #c9dcc7; stroke-width: 1.2; }
      .accentAmber { fill: #fbf1df; stroke: #e5cc9b; stroke-width: 1.2; }
      .line { stroke: #7e8b95; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dashed { stroke-dasharray: 7 8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7e8b95"/>
    </marker>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#bg)"/>

  <text x="70" y="84" class="title">Cloud Run 目标态：周二 / 周五自动跑</text>
  <text x="70" y="118" class="sub">先把当前批处理搬到云端，再由 Cloud Scheduler 定时触发。每次跑完自动出 report 并刷新 archive。</text>

  <rect x="64" y="158" width="1472" height="742" rx="28" class="panel" filter="url(#shadow)"/>

  <!-- left trigger column -->
  <g transform="translate(92,214)">
    <rect x="0" y="0" width="270" height="130" rx="22" class="accentBlue"/>
    <text x="22" y="32" class="chip">触发器</text>
    <text x="22" y="64" class="boxTitle">Cloud Scheduler</text>
    <text x="22" y="92" class="boxText">周二 / 周五，北京时间 09:00。</text>
    <text x="22" y="114" class="boxSmall">也可保留手动触发做测试。</text>

    <rect x="0" y="178" width="270" height="130" rx="22" class="accentGreen"/>
    <text x="22" y="210" class="chip">手动</text>
    <text x="22" y="242" class="boxTitle">Cloud Run Job</text>
    <text x="22" y="270" class="boxText">一次性批处理，不常驻。</text>
    <text x="22" y="292" class="boxSmall">更适合“跑一次，出一次 report”的工作流。</text>

    <path d="M135 130 L135 174" class="line" marker-end="url(#arrow)"/>
  </g>

  <!-- job pipeline -->
  <g transform="translate(408,214)">
    <rect x="0" y="0" width="232" height="118" rx="22" class="panelStrong"/>
    <text x="20" y="32" class="chip">入口</text>
    <text x="20" y="64" class="boxTitle">抓取 sources</text>
    <text x="20" y="92" class="boxText">RSS / Web / YouTube / Podcasts。</text>

    <rect x="258" y="0" width="232" height="118" rx="22" class="panelStrong"/>
    <text x="278" y="32" class="chip">状态</text>
    <text x="278" y="64" class="boxTitle">state + 去重</text>
    <text x="278" y="92" class="boxText">跳过已见 URL 和未到窗口的源。</text>

    <rect x="516" y="0" width="232" height="118" rx="22" class="accentAmber"/>
    <text x="536" y="32" class="chip">分析</text>
    <text x="536" y="64" class="boxTitle">Gemini scoring</text>
    <text x="536" y="92" class="boxText">筛出 3 分以上的高信号。</text>

    <rect x="774" y="0" width="232" height="118" rx="22" class="accentGreen"/>
    <text x="794" y="32" class="chip">渲染</text>
    <text x="794" y="64" class="boxTitle">report HTML</text>
    <text x="794" y="92" class="boxText">每日一页，可点击展开与我方业务相关性。</text>

    <rect x="1032" y="0" width="232" height="118" rx="22" class="accentBlue"/>
    <text x="1052" y="32" class="chip">归档</text>
    <text x="1052" y="64" class="boxTitle">archive index</text>
    <text x="1052" y="92" class="boxText">按日期纵向列表，近三次置顶。</text>

    <path d="M232 59 L254 59" class="line" marker-end="url(#arrow)"/>
    <path d="M490 59 L512 59" class="line" marker-end="url(#arrow)"/>
    <path d="M748 59 L770 59" class="line" marker-end="url(#arrow)"/>
    <path d="M1006 59 L1028 59" class="line" marker-end="url(#arrow)"/>
  </g>

  <!-- infra row -->
  <g transform="translate(408,392)">
    <rect x="0" y="0" width="310" height="116" rx="20" class="panelSoft"/>
    <text x="20" y="32" class="chip">云端落点</text>
    <text x="20" y="64" class="boxTitle">对象存储 / Artifact bucket</text>
    <text x="20" y="92" class="boxText">保存 raw / scored / report / archive。</text>

    <rect x="340" y="0" width="310" height="116" rx="20" class="panelSoft"/>
    <text x="360" y="32" class="chip">调度后</text>
    <text x="360" y="64" class="boxTitle">自动刷新 archive 首页</text>
    <text x="360" y="92" class="boxText">跑完就更新到最新日期页。</text>

    <rect x="680" y="0" width="310" height="116" rx="20" class="panelSoft"/>
    <text x="700" y="32" class="chip">测试入口</text>
    <text x="700" y="64" class="boxTitle">手动 run-now</text>
    <text x="700" y="92" class="boxText">先测试稳定，再交给 Scheduler。</text>

    <path d="M310 58 L334 58" class="line dashed" marker-end="url(#arrow)"/>
    <path d="M650 58 L674 58" class="line dashed" marker-end="url(#arrow)"/>
  </g>

  <!-- bottom note -->
  <g transform="translate(92,586)">
    <rect x="0" y="0" width="1426" height="170" rx="22" class="panelSoft"/>
    <text x="22" y="34" class="boxTitle">为什么先 Cloud Run，再 Scheduler</text>
    <text x="22" y="62" class="boxText">先把批处理在云端跑通，确认环境变量、抓取、Gemini 评分、report 生成、archive 更新都稳定；然后再让周二 / 周五的定时器去触发它。</text>
    <text x="22" y="92" class="boxText">这条链路对应你的目标节奏：一周两次抓取，跑完立即出 report，archive 自动跟上。之后再按你的反馈删掉没用的 feed。</text>
    <text x="22" y="122" class="boxText">所以 Cloud Run Job 是“执行体”，Cloud Scheduler 是“时间开关”。</text>
  </g>
</svg>
