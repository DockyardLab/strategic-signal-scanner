<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F9FC"/>
      <stop offset="100%" stop-color="#EEF3FA"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F7FF"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3FFF9"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF7E8"/>
      <stop offset="100%" stop-color="#FFF1D3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 38px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0F172A; }
      .subtitle { font: 400 18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#475569; }
      .section { font: 700 21px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0F172A; }
      .label { font: 700 16px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#1E293B; }
      .body { font: 400 16px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#334155; }
      .small { font: 400 14px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#475569; }
      .chip { font: 700 13px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; letter-spacing:.2px; }
      .hint { font: 700 15px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#7C2D12; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="78" class="title">Follow Builders 作为“前沿探测器” vs 我们的 Strategic Signal Scanner</text>
  <text x="80" y="112" class="subtitle">业务上最适合的关系不是替代，而是：它负责广撒网，我们负责精过滤，最后只把对 Rosy 真有用的信号留下来。</text>

  <!-- Left card -->
  <g filter="url(#shadow)">
    <rect x="80" y="150" width="700" height="420" rx="28" fill="url(#leftCard)" stroke="#C7D7F7"/>
  </g>
  <rect x="110" y="180" width="160" height="32" rx="16" fill="#DCEAFE"/>
  <text x="130" y="202" class="chip" fill="#1D4ED8">它：builders 探测器</text>
  <text x="110" y="248" class="section">follow-builders 做什么</text>
  <text x="110" y="286" class="body">
    <tspan x="110" dy="0">先维护一份 builders 白名单，再批量抓 X / podcast / blog。</tspan>
    <tspan x="110" dy="28">然后把内容统一整理成 feed-x / feed-blogs / feed-podcasts。</tspan>
    <tspan x="110" dy="28">你订阅它的 feed，就等于订阅它替你做过一次“前沿筛选”。</tspan>
  </text>

  <rect x="110" y="392" width="580" height="112" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="132" y="422" class="label">好处</text>
  <text x="132" y="451" class="small">
    <tspan x="132" dy="0">• 很适合 X / 播客 / 访谈这种“人驱动”的内容。</tspan>
    <tspan x="132" dy="24">• 中央维护白名单，你不用自己追每个 builder。</tspan>
    <tspan x="132" dy="24">• 它更像一个“已经帮你先看过一遍”的上游雷达。</tspan>
  </text>

  <!-- Right card -->
  <g filter="url(#shadow)">
    <rect x="820" y="150" width="700" height="420" rx="28" fill="url(#rightCard)" stroke="#BFE7D4"/>
  </g>
  <rect x="850" y="180" width="160" height="32" rx="16" fill="#DCFCE7"/>
  <text x="870" y="202" class="chip" fill="#166534">我们：信号筛选器</text>
  <text x="850" y="248" class="section">Strategic Signal Scanner 做什么</text>
  <text x="850" y="286" class="body">
    <tspan x="850" dy="0">从 RSS / Web / Podcast 抓原始内容，再按 Rosy 的业务规则评分。</tspan>
    <tspan x="850" dy="28">我们保留高分项，隐藏 1-2 分噪声，写入 scored 文件和 report。</tspan>
    <tspan x="850" dy="28">重点不是“谁发了什么”，而是“这条对 Rosy 到底有没有用”。</tspan>
  </text>

  <rect x="850" y="392" width="580" height="112" rx="18" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="872" y="422" class="label">好处</text>
  <text x="872" y="451" class="small">
    <tspan x="872" dy="0">• 更贴业务：只看和 Rosy 的课程 / 出海 / 组织相关的信号。</tspan>
    <tspan x="872" dy="24">• 可定制：refresh_hours、state.json、分组、评分阈值都能调。</tspan>
    <tspan x="872" dy="24">• 更适合做最终决策和 report，而不是只看热闹。</tspan>
  </text>

  <!-- Bridge -->
  <g filter="url(#shadow)">
    <rect x="340" y="610" width="920" height="120" rx="26" fill="url(#bridge)" stroke="#F5D58B"/>
  </g>
  <text x="380" y="648" class="section" fill="#92400E">为什么要借鉴它</text>
  <text x="380" y="680" class="body">
    <tspan x="380" dy="0">因为它已经把“谁值得跟”的问题做成了一个稳定的上游系统，尤其擅长 builders、X、播客和访谈。</tspan>
    <tspan x="380" dy="26">我们不想重复造轮子，而是把它当成前沿探测器，再把结果送进我们的相关性评分系统。</tspan>
  </text>

  <!-- Three-step adoption -->
  <g filter="url(#shadow)">
    <rect x="80" y="770" width="1440" height="340" rx="28" fill="#FFFFFF" stroke="#D9E2F2"/>
  </g>
  <text x="110" y="812" class="section">如何借鉴它：我们只吸收“上游能力”，不照搬它的全部逻辑</text>

  <!-- Step 1 -->
  <rect x="110" y="845" width="420" height="220" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="150" cy="885" r="18" fill="#1D4ED8"/>
  <text x="144" y="891" class="chip" fill="#FFFFFF">1</text>
  <text x="180" y="890" class="label">把它当成“上游 feed 供应商”</text>
  <text x="140" y="930" class="small">
    <tspan x="140" dy="0">订阅它输出的 feed-x / feed-blogs / feed-podcasts。</tspan>
    <tspan x="140" dy="24">这些内容先进入我们自己的“front / builders_frontier”组。</tspan>
    <tspan x="140" dy="24">它负责先帮我们把 builders 世界扫一遍。</tspan>
  </text>

  <!-- Step 2 -->
  <rect x="590" y="845" width="420" height="220" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="630" cy="885" r="18" fill="#059669"/>
  <text x="624" y="891" class="chip" fill="#FFFFFF">2</text>
  <text x="660" y="890" class="label">进入我们的评分系统</text>
  <text x="620" y="930" class="small">
    <tspan x="620" dy="0">我们再用 system_instruction.md 判断：和 Rosy 有多相关。</tspan>
    <tspan x="620" dy="24">4-5 分进入主视野，3 分进次重点，1-2 分默认不显示。</tspan>
    <tspan x="620" dy="24">这一步才是我们真正的“业务筛选”。</tspan>
  </text>

  <!-- Step 3 -->
  <rect x="1070" y="845" width="420" height="220" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="1110" cy="885" r="18" fill="#EA580C"/>
  <text x="1104" y="891" class="chip" fill="#FFFFFF">3</text>
  <text x="1140" y="890" class="label">沉淀成我们的 report 和网页</text>
  <text x="1100" y="930" class="small">
    <tspan x="1100" dy="0">最终只保留能回溯原文的高分项，生成 scored 文件和网页。</tspan>
    <tspan x="1100" dy="24">follow-builders 负责“发现”，我们负责“判断和呈现”。</tspan>
    <tspan x="1100" dy="24">这样既省时间，也更贴 Rosy 的工作流。</tspan>
  </text>

  <!-- Bottom takeaway strip -->
  <rect x="110" y="1070" width="1380" height="20" rx="10" fill="#E2E8F0"/>
  <text x="110" y="1124" class="hint">最终分工：follow-builders = 前沿雷达；Strategic Signal Scanner = Rosy 相关性过滤器；两者叠加，才能既看得广，又看得准。</text>
</svg>
