<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1900" viewBox="0 0 1400 1900" role="img" aria-labelledby="title desc">
  <title id="title">邮件账号安全运维清单</title>
  <desc id="desc">A polished Chinese infographic listing safe operating tips for email accounts used in Cloud Run notifications, including app passwords, Secret Manager, rotation, and sharing guidance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="60%" stop-color="#f7efe1"/>
      <stop offset="100%" stop-color="#efe0cb"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#dce8fb"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eefaf0"/>
      <stop offset="100%" stop-color="#d9efdf"/>
    </linearGradient>
    <linearGradient id="cardAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ea"/>
      <stop offset="100%" stop-color="#f5dfc2"/>
    </linearGradient>
    <linearGradient id="cardRose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f1"/>
      <stop offset="100%" stop-color="#f6d7d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#8d6b4b" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 42px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#6b3f2b; letter-spacing:-.03em; }
      .subtitle { font: 500 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#8b634d; }
      .section { font: 800 26px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#6b3f2b; }
      .body { font: 500 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#61493d; }
      .small { font: 500 15px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#6a5549; }
      .tiny { font: 500 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#745e52; }
      .chip { font: 800 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; letter-spacing:.04em; fill:#6b3f2b; }
      .card { rx: 28; ry: 28; filter:url(#shadow); stroke:#dcc3a7; stroke-width:1.2; }
      .pill { rx: 999; ry: 999; }
      .rule { stroke:#d9c2a8; stroke-width:1.1; }
      .check { fill:#2f7d46; font: 800 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; }
      .warn { fill:#8a4d35; font: 800 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; }
      .mono { font: 700 14px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace; fill:#734f3b; }
    </style>
  </defs>

  <rect width="1400" height="1900" fill="url(#bg)"/>

  <text x="72" y="84" class="title">邮件账号安全运维清单</text>
  <text x="72" y="122" class="subtitle">适合给学生看的运行 tips：把“发邮件”做成稳定、可轮换、可交接、可审计的云上配置。</text>

  <rect x="64" y="160" width="1272" height="160" rx="32" class="card" fill="url(#cardBlue)"/>
  <text x="96" y="208" class="section">你要保管什么</text>
  <text x="96" y="244" class="body">这套系统里真正需要长期保护的，不是整套账号本身，而是“可发送的最小凭证集”。</text>
  <rect x="96" y="266" width="248" height="36" rx="999" class="pill" fill="#ffffff" stroke="#c8d7f0"/>
  <text x="118" y="290" class="chip">发件人邮箱地址</text>
  <rect x="360" y="266" width="250" height="36" rx="999" class="pill" fill="#ffffff" stroke="#c8d7f0"/>
  <text x="382" y="290" class="chip">Gmail App Password</text>
  <rect x="626" y="266" width="256" height="36" rx="999" class="pill" fill="#ffffff" stroke="#c8d7f0"/>
  <text x="648" y="290" class="chip">Secret Manager 中的 secret</text>
  <rect x="898" y="266" width="400" height="36" rx="999" class="pill" fill="#ffffff" stroke="#c8d7f0"/>
  <text x="920" y="290" class="chip">收件人名单 / 订阅列表</text>

  <rect x="64" y="350" width="624" height="424" rx="30" class="card" fill="url(#cardGreen)"/>
  <text x="96" y="400" class="section">安全做法</text>
  <line x1="96" y1="420" x2="656" y2="420" class="rule"/>
  <text x="96" y="462" class="check">✓</text>
  <text x="130" y="462" class="body">把 SMTP 密码放到 Secret Manager，不要写进代码和文档正文。</text>
  <text x="96" y="510" class="check">✓</text>
  <text x="130" y="510" class="body">发件人统一用一个专门账号，便于审计和交接。</text>
  <text x="96" y="558" class="check">✓</text>
  <text x="130" y="558" class="body">邮件正文用模板拼接，默认称呼可以用 “Hi” 或 “Hello”。</text>
  <text x="96" y="606" class="check">✓</text>
  <text x="130" y="606" class="body">收件人放订阅名单，后续可以扩展成多人接收。</text>
  <text x="96" y="654" class="check">✓</text>
  <text x="130" y="654" class="body">每次发信都保留日志，方便排查“发了但没收到”的情况。</text>
  <text x="96" y="702" class="check">✓</text>
  <text x="130" y="702" class="body">App Password 丢失后可以立即吊销并重新生成。</text>

  <rect x="712" y="350" width="624" height="424" rx="30" class="card" fill="url(#cardAmber)"/>
  <text x="744" y="400" class="section">不要这样做</text>
  <line x1="744" y1="420" x2="1304" y2="420" class="rule"/>
  <text x="744" y="462" class="warn">✕</text>
  <text x="778" y="462" class="body">不要把 Gmail 登录密码直接放进 Cloud Run。</text>
  <text x="744" y="510" class="warn">✕</text>
  <text x="778" y="510" class="body">不要把 App Password 写到 GitHub、聊天记录或公开文档里。</text>
  <text x="744" y="558" class="warn">✕</text>
  <text x="778" y="558" class="body">不要让多个系统共用同一组可撤销凭证。</text>
  <text x="744" y="606" class="warn">✕</text>
  <text x="778" y="606" class="body">不要把“邮件发不出去”当成成功，必须看日志验证。</text>
  <text x="744" y="654" class="warn">✕</text>
  <text x="778" y="654" class="body">不要用个人主密码代替专用 SMTP 凭证。</text>
  <text x="744" y="702" class="warn">✕</text>
  <text x="778" y="702" class="body">不要让发件账号没有清晰用途，后面很难维护。</text>

  <rect x="64" y="802" width="1272" height="318" rx="30" class="card" fill="#fffaf4"/>
  <text x="96" y="852" class="section">推荐运维流程</text>
  <line x1="96" y1="872" x2="1304" y2="872" class="rule"/>

  <rect x="96" y="908" width="216" height="146" rx="22" fill="#eef5ff" stroke="#cfdcf0"/>
  <text x="120" y="944" class="boxTitle">1. 生成 App Password</text>
  <text x="120" y="972" class="small">在 Gmail 账号里开两步验证后生成。</text>
  <text x="120" y="1000" class="small">只给 SMTP 用。</text>

  <rect x="340" y="908" width="216" height="146" rx="22" fill="#eefaf0" stroke="#cfe5d3"/>
  <text x="364" y="944" class="boxTitle">2. 放进 Secret Manager</text>
  <text x="364" y="972" class="small">用 secret 保存，不在本地明文落盘。</text>
  <text x="364" y="1000" class="small">Cloud Run 只读。</text>

  <rect x="584" y="908" width="216" height="146" rx="22" fill="#fff7ea" stroke="#ead1a7"/>
  <text x="608" y="944" class="boxTitle">3. 云端引用 secret</text>
  <text x="608" y="972" class="small">Job 里通过 `--set-secrets` 挂载。</text>
  <text x="608" y="1000" class="small">不把密码写进 env 文本。</text>

  <rect x="828" y="908" width="216" height="146" rx="22" fill="#fff1f1" stroke="#e7c2c2"/>
  <text x="852" y="944" class="boxTitle">4. 先手动跑一次</text>
  <text x="852" y="972" class="small">确认日志出现 “Email notification sent”.</text>
  <text x="852" y="1000" class="small">再交给 Scheduler。</text>

  <rect x="1072" y="908" width="216" height="146" rx="22" fill="#f6f0ff" stroke="#dccff1"/>
  <text x="1096" y="944" class="boxTitle">5. 定期轮换</text>
  <text x="1096" y="972" class="small">改密后记得更新 secret。</text>
  <text x="1096" y="1000" class="small">旧 App Password 可立即撤销。</text>

  <rect x="64" y="1150" width="1272" height="202" rx="30" class="card" fill="url(#cardRose)"/>
  <text x="96" y="1200" class="section">给学生的一句总结</text>
  <line x1="96" y1="1220" x2="1304" y2="1220" class="rule"/>
  <text x="96" y="1262" class="body">把邮件账号当成“可轮换的基础设施”，而不是私人密码。真正长期保存的是 Secret Manager 里的 secret，</text>
  <text x="96" y="1294" class="body">不是聊天记录里的密码截图。收到邮件之前，先看日志确认 SMTP 是否成功登录和发信。</text>
  <text x="96" y="1332" class="mono">关键词：App Password · Secret Manager · SMTP 日志 · 定期轮换 · 不要明文共享</text>

  <text x="72" y="1450" class="tiny">适用场景：Cloud Run 通知邮件、订阅邮件、教学演示、团队共享运行手册。</text>
  <text x="72" y="1480" class="tiny">如果你愿意，我也可以把这份清单同步改成 HTML 版，方便直接放到教程页面里。</text>
</svg>
