<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #475569; }
      .section { font: 700 22px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #0f172a; }
      .stepNum { font: 800 20px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #ffffff; }
      .stepTitle { font: 700 18px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #0f172a; }
      .label { font: 600 14px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #0f172a; }
      .small { font: 500 13px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #475569; }
      .tiny { font: 500 12px "Inter","PingFang SC","Microsoft YaHei",sans-serif; fill: #64748b; }
      .doneCard { fill: #ffffff; stroke: #1d4ed8; stroke-width: 2.5; rx: 22; ry: 22; }
      .pendingCard { fill: #fffaf0; stroke: #f59e0b; stroke-width: 2.5; stroke-dasharray: 10 8; rx: 22; ry: 22; }
      .mutedCard { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; rx: 18; ry: 18; }
      .doneBadge { fill: #2563eb; }
      .pendingBadge { fill: #d97706; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
      .arrowBlue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowHeadBlue); }
      .arrowOrange { stroke: #d97706; stroke-width: 3; fill: none; marker-end: url(#arrowHeadOrange); }
      .stepLine { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 8; }
      .doneChip { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 14; ry: 14; }
      .pendingChip { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 14; ry: 14; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowHeadBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowHeadOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1220"/>
  <text class="title" x="60" y="58">Strategic Signal Scanner · Development Roadmap</text>
  <text class="subtitle" x="60" y="90">Step 1 is already built and runnable. Steps 2-4 are pending and shown with dashed frames.</text>

  <rect x="1330" y="28" width="410" height="88" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="1350" y="48" width="30" height="18" rx="9" ry="9" fill="#2563eb"/>
  <text class="small" x="1394" y="62">Done / runnable</text>
  <rect x="1350" y="76" width="30" height="18" rx="9" ry="9" fill="#fffaf0" stroke="#f59e0b" stroke-dasharray="8 6"/>
  <text class="small" x="1394" y="90">Pending / to build</text>

  <!-- Step 1 -->
  <text class="section" x="60" y="150">Step 1 · 已完成：本地最小回放 / 提示词校准</text>
  <rect class="doneCard" x="50" y="170" width="1700" height="210"/>
  <rect x="72" y="194" width="46" height="46" rx="14" ry="14" class="doneBadge"/>
  <text class="stepNum" x="87" y="224">1</text>
  <text class="stepTitle" x="140" y="215">本地回放引擎</text>
  <text class="small" x="140" y="242">signal_replay.py 读取 .env / system_instruction.md / samples/*.json，支持 mock / gemini / print-prompt。</text>
  <text class="small" x="140" y="266">用途：先在本地把“相关性判断”和“输出格式”磨准，不烧 token。</text>

  <rect class="doneChip" x="140" y="292" width="240" height="58"/>
  <text class="label" x="160" y="325">.env</text>
  <text class="tiny" x="160" y="346">GEMINI_API_KEY / model</text>

  <rect class="doneChip" x="410" y="292" width="360" height="58"/>
  <text class="label" x="430" y="325">system_instruction.md</text>
  <text class="tiny" x="430" y="346">完整 System Instruction，已固化到本地文件</text>

  <rect class="doneChip" x="810" y="292" width="300" height="58"/>
  <text class="label" x="830" y="325">samples/*.json</text>
  <text class="tiny" x="830" y="346">最小样本：输入 / expected / note</text>

  <rect class="doneChip" x="1150" y="292" width="230" height="58"/>
  <text class="label" x="1170" y="325">mock mode</text>
  <text class="tiny" x="1170" y="346">零 token，本地打分</text>

  <rect class="doneChip" x="1410" y="292" width="300" height="58"/>
  <text class="label" x="1430" y="325">gemini mode</text>
  <text class="tiny" x="1430" y="346">google-genai + Flash Lite + 重试</text>

  <path class="arrowBlue" d="M 380 321 C 400 321, 400 321, 410 321"/>
  <path class="arrowBlue" d="M 770 321 C 790 321, 800 321, 810 321"/>
  <path class="arrowBlue" d="M 1110 321 C 1130 321, 1140 321, 1150 321"/>
  <path class="arrowBlue" d="M 1380 321 C 1390 321, 1400 321, 1410 321"/>

  <!-- Step 2 -->
  <text class="section" x="60" y="454">Step 2 · 已完成：真实信息抓取 / 采集层</text>
  <rect class="doneCard" x="50" y="474" width="1700" height="190"/>
  <rect x="72" y="498" width="46" height="46" rx="14" ry="14" class="pendingBadge"/>
  <text class="stepNum" x="87" y="528">2</text>
  <text class="stepTitle" x="140" y="519">Sources / Fetcher</text>
  <text class="small" x="140" y="546">接真实 RSS、网页抓取、文章清洗、去重、标准化输入。</text>
  <text class="small" x="140" y="570">目标：让系统从“本地样本回放”升级成“自动接入真实内容流”。</text>

  <rect class="doneChip" x="140" y="595" width="270" height="46"/>
  <text class="label" x="160" y="624">RSS / Web sources</text>

  <rect class="doneChip" x="440" y="595" width="250" height="46"/>
  <text class="label" x="460" y="624">Fetcher</text>

  <rect class="doneChip" x="720" y="595" width="250" height="46"/>
  <text class="label" x="740" y="624">Content clean / dedupe</text>

  <rect class="doneChip" x="1000" y="595" width="280" height="46"/>
  <text class="label" x="1020" y="624">Canonical article payload</text>

  <rect class="doneChip" x="1310" y="595" width="380" height="46"/>
  <text class="label" x="1330" y="624">Ready for analyzer input</text>

  <path class="arrowOrange" d="M 410 618 C 425 618, 430 618, 440 618"/>
  <path class="arrowOrange" d="M 690 618 C 705 618, 710 618, 720 618"/>
  <path class="arrowOrange" d="M 970 618 C 985 618, 990 618, 1000 618"/>
  <path class="arrowOrange" d="M 1280 618 C 1295 618, 1300 618, 1310 618"/>

  <!-- Step 3 -->
  <text class="section" x="60" y="740">Step 3 · 待开发：生产部署 / 任务调度层</text>
  <rect class="pendingCard" x="50" y="760" width="1700" height="190"/>
  <rect x="72" y="784" width="46" height="46" rx="14" ry="14" class="pendingBadge"/>
  <text class="stepNum" x="87" y="814">3</text>
  <text class="stepTitle" x="140" y="805">Cloud Run + Cloud Scheduler</text>
  <text class="small" x="140" y="832">把本地脚本变成云端服务，支持 /run、/run-now、定时触发。</text>
  <text class="small" x="140" y="856">目标：让扫描器可以脱离本机、自动每天/每周运行。</text>

  <rect class="pendingChip" x="140" y="880" width="220" height="46"/>
  <text class="label" x="160" y="909">Cloud Run service</text>

  <rect class="pendingChip" x="390" y="880" width="230" height="46"/>
  <text class="label" x="410" y="909">Cloud Scheduler</text>

  <rect class="pendingChip" x="650" y="880" width="260" height="46"/>
  <text class="label" x="670" y="909">Runtime secrets / env</text>

  <rect class="pendingChip" x="940" y="880" width="290" height="46"/>
  <text class="label" x="960" y="909">Production Gemini call</text>

  <rect class="pendingChip" x="1260" y="880" width="420" height="46"/>
  <text class="label" x="1280" y="909">Scheduled execution and monitoring</text>

  <path class="arrowOrange" d="M 360 903 C 375 903, 380 903, 390 903"/>
  <path class="arrowOrange" d="M 620 903 C 635 903, 640 903, 650 903"/>
  <path class="arrowOrange" d="M 910 903 C 925 903, 930 903, 940 903"/>
  <path class="arrowOrange" d="M 1230 903 C 1245 903, 1250 903, 1260 903"/>

  <!-- Step 4 -->
  <text class="section" x="60" y="1026">Step 4 · 待开发：输出闭环 / 交付层</text>
  <rect class="pendingCard" x="50" y="1046" width="1700" height="124"/>
  <rect x="72" y="1068" width="46" height="46" rx="14" ry="14" class="pendingBadge"/>
  <text class="stepNum" x="87" y="1098">4</text>
  <text class="stepTitle" x="140" y="1088">Email / Firestore / Archive / Report</text>
  <text class="small" x="140" y="1114">把结果发出去、存下来、能回看、能去重，形成真正的“扫描 → 判断 → 交付”闭环。</text>
  <text class="small" x="140" y="1138">包含 Gmail OAuth、Firestore 归档、周报渲染、公开 archive 页等。</text>

  <rect class="pendingChip" x="1420" y="1078" width="240" height="46"/>
  <text class="label" x="1440" y="1107">Delivery loop</text>

  <path class="arrowOrange" d="M 1660 1099 C 1670 1099, 1675 1099, 1685 1099"/>

  <!-- Overall flow connectors -->
  <path class="stepLine" d="M 900 380 L 900 474"/>
  <path class="stepLine" d="M 900 664 L 900 760"/>
  <path class="stepLine" d="M 900 950 L 900 1046"/>

  <!-- Side note -->
  <rect x="1230" y="132" width="470" height="36" rx="14" ry="14" fill="#eef2ff" stroke="#c7d2fe"/>
  <text class="small" x="1250" y="156">Step 1 已能独立运行；Step 2-4 是下一阶段的生产化路线。</text>

</svg>
