<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F6BFF"/>
      <stop offset="1" stop-color="#6EA8FF"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1F8A5B"/>
      <stop offset="1" stop-color="#58C08D"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C76A00"/>
      <stop offset="1" stop-color="#F3B24D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1E3A5F" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .sub { font: 500 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .section { font: 800 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .text { font: 500 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748B; }
      .pillText { font: 700 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #fff; letter-spacing: 0.02em; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="0" fill="url(#bg)"/>

  <text x="64" y="72" class="title">YouTube 接入方案图</text>
  <text x="64" y="106" class="sub">目标：把频道订阅、视频提取、文稿标准化、相关性评分和 report 串成一条稳定的业务链路。</text>

  <!-- Top lane: upstream -->
  <rect x="56" y="140" width="1488" height="282" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="84" y="182" class="section">1. 上游来源：先订阅“谁”，再看“新内容是什么”</text>

  <rect x="84" y="214" width="340" height="164" rx="22" fill="#EAF2FF" stroke="#C8DBFF"/>
  <text x="108" y="246" class="label">YouTube 频道清单</text>
  <text x="108" y="274" class="text">• Anthropic / Claude</text>
  <text x="108" y="298" class="text">• Google Labs / DeepMind</text>
  <text x="108" y="322" class="text">• AJ / Peter Yang / Karpathy</text>
  <text x="108" y="346" class="text">• AI Builders / 其他 builders</text>
  <rect x="276" y="230" width="122" height="24" rx="12" fill="url(#blue)"/>
  <text x="295" y="247" class="pillText">订阅名单</text>

  <rect x="462" y="214" width="302" height="164" rx="22" fill="#EEFDF7" stroke="#B7EFD2"/>
  <text x="486" y="246" class="label">抓取方式 A：频道 feed</text>
  <text x="486" y="274" class="text">适合官方可订阅的频道 / 播客 / 列表页</text>
  <text x="486" y="300" class="text">优点：简单、稳定、增量更新自然</text>
  <text x="486" y="326" class="text">缺点：不是所有视频源都能直接订阅</text>
  <rect x="652" y="230" width="86" height="24" rx="12" fill="url(#green)"/>
  <text x="670" y="247" class="pillText">低成本</text>

  <rect x="794" y="214" width="302" height="164" rx="22" fill="#FFF7EA" stroke="#F6D7A6"/>
  <text x="818" y="246" class="label">抓取方式 B：Agent Reach</text>
  <text x="818" y="274" class="text">适合抓字幕 / transcript / 视频正文</text>
  <text x="818" y="300" class="text">优点：覆盖面广，适合最新访谈和长视频</text>
  <text x="818" y="326" class="text">缺点：需要做归一化和去重</text>
  <rect x="974" y="230" width="98" height="24" rx="12" fill="url(#amber)"/>
  <text x="989" y="247" class="pillText">字幕提取</text>

  <rect x="1126" y="214" width="374" height="164" rx="22" fill="#F6F3FF" stroke="#DDCCFF"/>
  <text x="1150" y="246" class="label">抓取方式 C：NotebookLM</text>
  <text x="1150" y="274" class="text">适合把视频转成可读文稿，再导出成 feed</text>
  <text x="1150" y="300" class="text">优点：最适合人工确认过的高价值视频</text>
  <text x="1150" y="326" class="text">缺点：半自动，适合先验证再规模化</text>
  <rect x="1382" y="230" width="98" height="24" rx="12" fill="url(#blue)"/>
  <text x="1405" y="247" class="pillText">文稿化</text>

  <!-- arrows top -->
  <path d="M424 296 H446" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M446 296 l-10 -8 v16 z" fill="#94A3B8"/>
  <path d="M764 296 H786" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M786 296 l-10 -8 v16 z" fill="#94A3B8"/>
  <path d="M1096 296 H1118" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M1118 296 l-10 -8 v16 z" fill="#94A3B8"/>

  <!-- Middle lane: normalization -->
  <rect x="56" y="452" width="1488" height="212" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="84" y="494" class="section">2. 中间层：把视频变成“我们的标准输入”</text>

  <rect x="84" y="524" width="420" height="112" rx="22" fill="#F8FAFC" stroke="#D7E2F1"/>
  <text x="108" y="558" class="label">统一标准化</text>
  <text x="108" y="586" class="text">把标题、来源、日期、链接、文稿整理成 canonical article / transcript</text>
  <text x="108" y="610" class="text">让不同来源的 YouTube 内容都能进入同一条评分管线</text>

  <rect x="540" y="524" width="316" height="112" rx="22" fill="#EEFDF7" stroke="#B7EFD2"/>
  <text x="564" y="558" class="label">去重 + 刷新窗</text>
  <text x="564" y="586" class="text">按频道频率控制抓取，避免同一视频重复进入报告</text>
  <text x="564" y="610" class="text">低频频道：更长窗口；高频频道：更短窗口</text>

  <rect x="892" y="524" width="298" height="112" rx="22" fill="#FFF7EA" stroke="#F6D7A6"/>
  <text x="916" y="558" class="label">新鲜度门槛</text>
  <text x="916" y="586" class="text">只把近 180 天内的高信号内容放进主视野</text>
  <text x="916" y="610" class="text">老 Builder 只留在后台，不打扰日常看板</text>

  <rect x="1220" y="524" width="296" height="112" rx="22" fill="#F6F3FF" stroke="#DDCCFF"/>
  <text x="1244" y="558" class="label">评分输入</text>
  <text x="1244" y="586" class="text">把文稿喂给 Gemini / System Instruction</text>
  <text x="1244" y="610" class="text">输出 relevance_score、signal_type、key_signal</text>

  <!-- arrows middle -->
  <path d="M504 580 H532" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M532 580 l-10 -8 v16 z" fill="#94A3B8"/>
  <path d="M856 580 H884" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M884 580 l-10 -8 v16 z" fill="#94A3B8"/>
  <path d="M1190 580 H1212" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M1212 580 l-10 -8 v16 z" fill="#94A3B8"/>

  <!-- Bottom lane: output -->
  <rect x="56" y="694" width="1488" height="228" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="84" y="736" class="section">3. 下游输出：只把真正相关的内容展示给你</text>

  <rect x="84" y="764" width="340" height="112" rx="22" fill="#EAF2FF" stroke="#C8DBFF"/>
  <text x="108" y="798" class="label">Web report</text>
  <text x="108" y="826" class="text">只显示 3 分以上内容</text>
  <text x="108" y="850" class="text">卡片带标题、分数、理由、原文链接</text>

  <rect x="452" y="764" width="364" height="112" rx="22" fill="#EEFDF7" stroke="#B7EFD2"/>
  <text x="476" y="798" class="label">Report 里的“感知”</text>
  <text x="476" y="826" class="text">5 分 = 业务很近；4 分 = 明显相关；3 分 = 可参考</text>
  <text x="476" y="850" class="text">1–2 分默认隐藏，只进档案不进主视野</text>

  <rect x="844" y="764" width="352" height="112" rx="22" fill="#FFF7EA" stroke="#F6D7A6"/>
  <text x="868" y="798" class="label">你要看的结果</text>
  <text x="868" y="826" class="text">例如：AI 教育新玩法、Google / Anthropic 的产品打法</text>
  <text x="868" y="850" class="text">以及和你业务更近的前沿变化</text>

  <rect x="1224" y="764" width="292" height="112" rx="22" fill="#F6F3FF" stroke="#DDCCFF"/>
  <text x="1248" y="798" class="label">最终动作</text>
  <text x="1248" y="826" class="text">打开原文、收藏、复盘、进入日常决策</text>
  <text x="1248" y="850" class="text">高分内容再考虑进周报 / 汇报 / 演示</text>

  <!-- arrows bottom -->
  <path d="M424 820 H444" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M444 820 l-10 -8 v16 z" fill="#94A3B8"/>
  <path d="M816 820 H836" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M836 820 l-10 -8 v16 z" fill="#94A3B8"/>
  <path d="M1196 820 H1216" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M1216 820 l-10 -8 v16 z" fill="#94A3B8"/>

  <text x="64" y="952" class="small">建议用法：先把 YouTube 频道当作上游输入，Agent Reach / NotebookLM 只负责提取文稿，我们的 scanner 负责相关性判断和报告展示。</text>
</svg>
