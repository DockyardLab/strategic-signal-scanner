<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Run 完整部署图</title>
  <desc id="desc">A polished deployment architecture diagram for the Strategic Signal Scanner, showing Cloud Scheduler triggering a Cloud Run Job, the batch pipeline, archive storage, email notification flow, and which steps call Gemini.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="52%" stop-color="#f7efdf"/>
      <stop offset="100%" stop-color="#efe2cf"/>
    </linearGradient>
    <linearGradient id="panelTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f5ebdb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7f0ff"/>
      <stop offset="100%" stop-color="#d9e8ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef9ee"/>
      <stop offset="100%" stop-color="#d9f0dd"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5e7"/>
      <stop offset="100%" stop-color="#f4e0c5"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdeceb"/>
      <stop offset="100%" stop-color="#f7d7d3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#846041" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5d42"/>
    </marker>
    <style>
      .title { font: 800 42px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#6f3f2c; letter-spacing:-0.03em; }
      .sub { font: 500 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#8d6552; }
      .section { font: 800 24px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#6f3f2c; }
      .boxTitle { font: 800 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#3d281d; }
      .boxText { font: 500 14px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#66574d; }
      .tiny { font: 500 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#755f52; }
      .chip { font: 700 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#7b5a49; letter-spacing:.03em; }
      .panel { fill: rgba(255,250,242,0.95); stroke:#e0ccb2; stroke-width:1.2; }
      .node { fill:#fff; stroke:#ddc7ae; stroke-width:1.1; }
      .nodeBlue { fill:url(#blue); stroke:#c6d6ea; stroke-width:1.1; }
      .nodeGreen { fill:url(#green); stroke:#c9e0cb; stroke-width:1.1; }
      .nodeAmber { fill:url(#amber); stroke:#e4cea8; stroke-width:1.1; }
      .nodeRed { fill:url(#red); stroke:#ebc6c2; stroke-width:1.1; }
      .line { stroke:#8b5d42; stroke-width:2.8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .lineSoft { stroke:#a58b72; stroke-width:2.2; fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:8 8; }
      .pill { rx:999; ry:999; }
    </style>
  </defs>

  <rect width="1800" height="1320" rx="36" fill="url(#bg)"/>

  <text x="72" y="78" class="title">Cloud Run 完整部署图</text>
  <text x="72" y="114" class="sub">Cloud Scheduler 定时触发 Cloud Run Job，跑完后自动更新 report、archive，并把摘要邮件发到你的邮箱。</text>

  <rect x="64" y="154" width="1672" height="1102" rx="30" class="panel" filter="url(#shadow)"/>

  <!-- Top trigger band -->
  <text x="96" y="210" class="section">1. 触发与入口</text>

  <rect x="96" y="238" width="360" height="124" rx="22" class="nodeBlue"/>
  <text x="120" y="270" class="chip">SCHEDULER</text>
  <text x="120" y="302" class="boxTitle">Cloud Scheduler</text>
  <text x="120" y="330" class="boxText">周二 / 周五 09:00（Asia/Shanghai）。</text>
  <text x="120" y="352" class="boxText">也可以手动 run 一次做 smoke test。</text>

  <rect x="490" y="238" width="360" height="124" rx="22" class="nodeGreen"/>
  <text x="514" y="270" class="chip">JOB</text>
  <text x="514" y="302" class="boxTitle">Cloud Run Job</text>
  <text x="514" y="330" class="boxText">`strategic-signal-scanner`</text>
  <text x="514" y="352" class="boxText">执行体，不常驻，跑完就退出。</text>

  <rect x="884" y="238" width="360" height="124" rx="22" class="nodeAmber"/>
  <text x="908" y="270" class="chip">DEFAULT GROUP</text>
  <text x="908" y="302" class="boxTitle">RUN_GROUP=cloudrun</text>
  <text x="908" y="330" class="boxText">现在映射到 `balanced`。</text>
  <text x="908" y="352" class="boxText">更丰富但不重复，适合日常日报。</text>

  <rect x="1278" y="238" width="362" height="124" rx="22" class="nodeRed"/>
  <text x="1302" y="270" class="chip">OPTIONAL</text>
  <text x="1302" y="302" class="boxTitle">balanced_plus</text>
  <text x="1302" y="330" class="boxText">更偏产品 / 创业 / builder。</text>
  <text x="1302" y="352" class="boxText">手动切换，不改默认生产链路。</text>

  <path d="M456 300 L486 300" class="line" marker-end="url(#arrow)"/>
  <path d="M850 300 L880 300" class="line" marker-end="url(#arrow)"/>
  <path d="M1244 300 L1274 300" class="line" marker-end="url(#arrow)"/>

  <!-- Middle pipeline -->
  <text x="96" y="430" class="section">2. 云端批处理主流程</text>
  <rect x="96" y="458" width="1608" height="320" rx="28" class="panel"/>

  <rect x="126" y="510" width="250" height="186" rx="20" class="node"/>
  <text x="150" y="544" class="chip">01 · CAPTURE</text>
  <text x="150" y="578" class="boxTitle">抓取 sources</text>
  <text x="150" y="606" class="boxText">RSS / Atom / Web / YouTube / Podcasts。</text>
  <text x="150" y="630" class="boxText">优先高信号组，按 cadence 刷新。</text>
  <text x="150" y="654" class="boxText">已见 URL 和旧源会被跳过。</text>

  <rect x="410" y="510" width="250" height="186" rx="20" class="nodeBlue"/>
  <text x="434" y="544" class="chip">02 · STATE</text>
  <text x="434" y="578" class="boxTitle">去重与状态</text>
  <text x="434" y="606" class="boxText">保存 seen URLs、title hash、content hash。</text>
  <text x="434" y="630" class="boxText">历史 state 从 bucket 回灌。</text>
  <text x="434" y="654" class="boxText">避免重复发同一条。</text>

  <rect x="694" y="510" width="250" height="186" rx="20" class="nodeAmber"/>
  <text x="718" y="544" class="chip">03 · SCORE</text>
  <text x="718" y="578" class="boxTitle">Gemini scoring</text>
  <text x="718" y="606" class="boxText">筛 relevance_score 高的内容。</text>
  <text x="718" y="630" class="boxText">当前 production 用 Vertex AI + Gemini。</text>
  <text x="718" y="654" class="boxText">低分内容不进主 report。</text>

  <rect x="978" y="510" width="250" height="186" rx="20" class="nodeGreen"/>
  <text x="1002" y="544" class="chip">04 · REPORT</text>
  <text x="1002" y="578" class="boxTitle">HTML report</text>
  <text x="1002" y="606" class="boxText">按天输出，主区只放高信号。</text>
  <text x="1002" y="630" class="boxText">不再空洞，内容更丰富但仍去重。</text>
  <text x="1002" y="654" class="boxText">可直接点开看当天结果。</text>

  <rect x="1262" y="510" width="410" height="186" rx="20" class="nodeRed"/>
  <text x="1286" y="544" class="chip">05 · ARCHIVE / EMAIL</text>
  <text x="1286" y="578" class="boxTitle">archive + 邮件</text>
  <text x="1286" y="606" class="boxText">archive_index.html 按月累计，历史可回看。</text>
  <text x="1286" y="630" class="boxText">成功后自动发邮件到你的邮箱。</text>
  <text x="1286" y="654" class="boxText">bucket 中同时保存 raw / scored / report / state。</text>

  <path d="M376 603 L406 603" class="line" marker-end="url(#arrow)"/>
  <path d="M660 603 L690 603" class="line" marker-end="url(#arrow)"/>
  <path d="M944 603 L974 603" class="line" marker-end="url(#arrow)"/>
  <path d="M1228 603 L1258 603" class="line" marker-end="url(#arrow)"/>

  <!-- Bottom infrastructure -->
  <text x="96" y="842" class="section">3. 存储、调度与维护</text>

  <rect x="96" y="870" width="512" height="170" rx="22" class="node"/>
  <text x="120" y="904" class="chip">STORAGE</text>
  <text x="120" y="938" class="boxTitle">Google Cloud Storage bucket</text>
  <text x="120" y="966" class="boxText">`gs://strategic-signal-scanner-archive/signal-archive/`</text>
  <text x="120" y="990" class="boxText">保存 report、archive、raw、scored 和 state。</text>
  <text x="120" y="1014" class="boxText">archive 是累计式的，不是每次重置。</text>

  <rect x="640" y="870" width="512" height="170" rx="22" class="nodeBlue"/>
  <text x="664" y="904" class="chip">SCHEDULER</text>
  <text x="664" y="938" class="boxTitle">定时触发与手动回放</text>
  <text x="664" y="966" class="boxText">Cloud Scheduler 发起 `:run` 请求。</text>
  <text x="664" y="990" class="boxText">Cloud Shell / gcloud 可手动 execute job。</text>
  <text x="664" y="1014" class="boxText">方便调试，也方便临时复跑。</text>

  <rect x="1184" y="870" width="420" height="170" rx="22" class="nodeGreen"/>
  <text x="1208" y="904" class="chip">MAINTENANCE</text>
  <text x="1208" y="938" class="boxTitle">日常维护要看什么</text>
  <text x="1208" y="966" class="boxText">1. report 是否有新内容</text>
  <text x="1208" y="990" class="boxText">2. archive 是否持续累积</text>
  <text x="1208" y="1014" class="boxText">3. 邮件是否自动发出</text>

  <path d="M608 956 L636 956" class="lineSoft" marker-end="url(#arrow)"/>
  <path d="M1156 956 L1180 956" class="lineSoft" marker-end="url(#arrow)"/>

  <!-- Model usage -->
  <text x="96" y="1060" class="section">4. 哪些环节会调用什么模型</text>
  <rect x="96" y="1084" width="1608" height="118" rx="22" class="panel"/>

  <rect x="126" y="1112" width="340" height="62" rx="16" class="nodeBlue"/>
  <text x="148" y="1138" class="chip">CALLS GEMINI</text>
  <text x="148" y="1160" class="boxText">评分 / 排序 / relevance 判断：`gemini-3.1-flash-lite-preview`</text>

  <rect x="494" y="1112" width="334" height="62" rx="16" class="node"/>
  <text x="516" y="1138" class="chip">NO MODEL</text>
  <text x="516" y="1160" class="boxText">抓取 / 去重 / state / archive 重建：纯代码逻辑</text>

  <rect x="856" y="1112" width="322" height="62" rx="16" class="nodeGreen"/>
  <text x="878" y="1138" class="chip">NO MODEL</text>
  <text x="878" y="1160" class="boxText">report HTML 生成：模板渲染，不再调用模型</text>

  <rect x="1206" y="1112" width="466" height="62" rx="16" class="nodeRed"/>
  <text x="1228" y="1138" class="chip">NO MODEL</text>
  <text x="1228" y="1160" class="boxText">邮件通知：SMTP 发送，不消耗 Gemini token</text>

  <!-- Final note -->
  <rect x="96" y="1208" width="1508" height="100" rx="22" fill="#fffaf4" stroke="#e0ccb2" stroke-width="1.0"/>
  <text x="120" y="1238" class="boxTitle">一句话总结</text>
  <text x="120" y="1266" class="tiny">Cloud Scheduler 负责“什么时候跑”，Cloud Run Job 负责“跑什么”，Cloud Storage 负责“存哪里”，邮件负责“跑完通知谁”。</text>
  <text x="120" y="1290" class="tiny">现在这套链路已经可以稳定：定时抓取、去重、评分、生成 report、更新 archive、自动发邮件；只有 scoring 环节真正调用 Gemini。</text>
</svg>
