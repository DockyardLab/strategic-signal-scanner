<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="52%" stop-color="#f6efdf"/>
      <stop offset="100%" stop-color="#efe3cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#6e5b41" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #2f3a3f; }
      .sub { font: 500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #66717a; }
      .boxTitle { font: 700 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #2f3a3f; }
      .boxText { font: 500 15px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #51606a; }
      .boxSmall { font: 500 13px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #7a6e60; }
      .chip { font: 700 12px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; fill: #4f6f8f; }
      .panel { fill: rgba(255,250,241,0.95); stroke: #e5d7c3; stroke-width: 1.2; }
      .panelStrong { fill: #fffaf3; stroke: #e5d7c3; stroke-width: 1.2; }
      .panelSoft { fill: rgba(255,255,255,0.65); stroke: #e7d9c5; stroke-width: 1.1; }
      .accentBlue { fill: #e6eff7; stroke: #bfd0e0; stroke-width: 1.2; }
      .accentGreen { fill: #edf5ea; stroke: #c9dcc7; stroke-width: 1.2; }
      .accentAmber { fill: #fbf1df; stroke: #e5cc9b; stroke-width: 1.2; }
      .line { stroke: #7e8b95; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dashed { stroke-dasharray: 7 8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7e8b95"/>
    </marker>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#bg)"/>

  <text x="70" y="84" class="title">本地单次跑通的工作流</text>
  <text x="70" y="118" class="sub">你现在的实现：收到一个链接或内容片段，一次性完成抓取、评分、报告、归档。</text>

  <rect x="64" y="158" width="1472" height="742" rx="28" class="panel" filter="url(#shadow)"/>

  <!-- main flow row -->
  <g transform="translate(90,214)">
    <rect x="0" y="0" width="250" height="118" rx="22" class="panelStrong"/>
    <text x="22" y="32" class="chip">输入</text>
    <text x="22" y="64" class="boxTitle">用户发来链接 / 视频 / 文稿</text>
    <text x="22" y="92" class="boxText">YouTube、文章、播客、摘录都可以。</text>

    <rect x="290" y="0" width="250" height="118" rx="22" class="accentBlue"/>
    <text x="312" y="32" class="chip">Skill</text>
    <text x="312" y="64" class="boxTitle">signal-archive-report</text>
    <text x="312" y="92" class="boxText">识别输入类型，决定走哪条标准化路径。</text>

    <rect x="580" y="0" width="250" height="118" rx="22" class="accentGreen"/>
    <text x="602" y="32" class="chip">前置</text>
    <text x="602" y="64" class="boxTitle">YouTube transcript</text>
    <text x="602" y="92" class="boxText">如果是视频，先把字幕 / 文稿提出来。</text>

    <rect x="870" y="0" width="250" height="118" rx="22" class="accentAmber"/>
    <text x="892" y="32" class="chip">标准化</text>
    <text x="892" y="64" class="boxTitle">Canonical raw item</text>
    <text x="892" y="92" class="boxText">统一成 title / source / date / url / content。</text>

    <rect x="1160" y="0" width="250" height="118" rx="22" class="panelSoft"/>
    <text x="1182" y="32" class="chip">评分</text>
    <text x="1182" y="64" class="boxTitle">Gemini scoring</text>
    <text x="1182" y="92" class="boxText">输出 relevance_score / signal_type / reason。</text>

    <path d="M250 59 L286 59" class="line" marker-end="url(#arrow)"/>
    <path d="M540 59 L576 59" class="line" marker-end="url(#arrow)"/>
    <path d="M830 59 L866 59" class="line" marker-end="url(#arrow)"/>
    <path d="M1120 59 L1156 59" class="line" marker-end="url(#arrow)"/>
  </g>

  <!-- branch note -->
  <g transform="translate(102,384)">
    <rect x="0" y="0" width="1450" height="90" rx="20" class="panelSoft"/>
    <text x="22" y="34" class="boxTitle">过滤规则</text>
    <text x="22" y="60" class="boxText">主视野只保留 3 分及以上；1-2 分只进归档，不打扰日常浏览。</text>
    <rect x="1130" y="20" width="286" height="48" rx="999" class="accentBlue"/>
    <text x="1150" y="50" class="boxText">低分隐藏 · 高分可点回原文</text>
  </g>

  <!-- output row -->
  <g transform="translate(90,512)">
    <rect x="0" y="0" width="320" height="150" rx="24" class="panelStrong"/>
    <text x="22" y="32" class="chip">输出 1</text>
    <text x="22" y="66" class="boxTitle">report_YYYY-MM-DD.html</text>
    <text x="22" y="94" class="boxText">一份正式的 HTML 报告。</text>
    <text x="22" y="120" class="boxSmall">展开后可看「与我方业务相关性」和原文链接。</text>

    <rect x="360" y="0" width="320" height="150" rx="24" class="panelStrong"/>
    <text x="382" y="32" class="chip">输出 2</text>
    <text x="382" y="66" class="boxTitle">scored_YYYY-MM-DD.json</text>
    <text x="382" y="94" class="boxText">保存所有条目与评分结果。</text>
    <text x="382" y="120" class="boxSmall">用于回溯、复核和后续归档。</text>

    <rect x="720" y="0" width="320" height="150" rx="24" class="panelStrong"/>
    <text x="742" y="32" class="chip">输出 3</text>
    <text x="742" y="66" class="boxTitle">archive_index.html</text>
    <text x="742" y="94" class="boxText">按日期列出近三次与历史报告。</text>
    <text x="742" y="120" class="boxSmall">一天一页，方便后续翻阅。</text>

    <rect x="1080" y="0" width="370" height="150" rx="24" class="panelStrong"/>
    <text x="1102" y="32" class="chip">浏览方式</text>
    <text x="1102" y="66" class="boxTitle">点日期 → 点报告 → 点原文</text>
    <text x="1102" y="94" class="boxText">形成可持续回看的归档链路。</text>
    <text x="1102" y="120" class="boxSmall">这就是你现在本地已经跑通的最小闭环。</text>
  </g>

  <!-- bottom note -->
  <g transform="translate(96,736)">
    <rect x="0" y="0" width="1448" height="126" rx="22" class="panelSoft"/>
    <text x="22" y="34" class="boxTitle">本地现状</text>
    <text x="22" y="60" class="boxText">已经完成：抓取、去重、评分、HTML report、archive 首页、YouTube transcript、单次跑通。还差：云端调度与自动化托管。</text>
    <text x="22" y="88" class="boxText">适合现在的节奏：手动发链接或跑一次，立即产出 report，并自动挂进 archive。</text>
  </g>
</svg>
