<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1360" viewBox="0 0 1680 1360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F8FF"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3FFF6"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF6"/>
      <stop offset="100%" stop-color="#FFF2D9"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="pillGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DCFCE7"/>
      <stop offset="100%" stop-color="#BBF7D0"/>
    </linearGradient>
    <linearGradient id="pillAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 40px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0F172A; }
      .subtitle { font: 400 18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#475569; }
      .h2 { font: 700 22px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0F172A; }
      .h3 { font: 700 17px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#1E293B; }
      .body { font: 400 16px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#334155; }
      .small { font: 400 14px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#475569; }
      .chip { font: 700 13px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; letter-spacing:.2px; }
      .metric { font: 700 24px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#0F172A; }
      .metricLabel { font: 400 13px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#64748B; }
      .accent { font: 700 15px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; fill:#7C2D12; }
    </style>
  </defs>

  <rect width="1680" height="1360" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="82" class="title">Follow Builders 的业务角色：上游前沿探测器</text>
  <text x="80" y="118" class="subtitle">最适合的用法不是替代我们，而是先帮我们扫一层 builders 世界，再把结果交给 Strategic Signal Scanner 做 Rosy 相关性判断。</text>

  <!-- Top summary strip -->
  <g filter="url(#shadow)">
    <rect x="80" y="150" width="1520" height="110" rx="24" fill="url(#cardC)" stroke="#F3C66A"/>
  </g>
  <rect x="110" y="182" width="170" height="30" rx="15" fill="#FEF3C7"/>
  <text x="128" y="203" class="chip" fill="#92400E">一句话结论</text>
  <text x="110" y="230" class="body">
    <tspan x="110" dy="0">follow-builders 更像“帮我们先看一遍”的外部雷达；我们负责把它过滤成 Rosy 真的该看的信号。</tspan>
  </text>

  <!-- Left card -->
  <g filter="url(#shadow)">
    <rect x="80" y="290" width="720" height="520" rx="28" fill="url(#cardA)" stroke="#C7D7F7"/>
  </g>
  <rect x="110" y="320" width="180" height="32" rx="16" fill="url(#pillBlue)"/>
  <text x="132" y="342" class="chip" fill="#1D4ED8">follow-builders = 上游探测器</text>
  <text x="110" y="388" class="h2">它为什么值得借鉴</text>
  <text x="110" y="426" class="body">
    <tspan x="110" dy="0">它先维护 builders 白名单，再批量抓 X、博客和播客。</tspan>
    <tspan x="110" dy="28">最后把内容整理成 feed-x / feed-blogs / feed-podcasts。</tspan>
    <tspan x="110" dy="28">本质上，它已经帮你做了一次“谁值得跟”的前置判断。</tspan>
  </text>

  <rect x="110" y="520" width="610" height="110" rx="20" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="132" y="550" class="h3">它的好处</text>
  <text x="132" y="580" class="small">
    <tspan x="132" dy="0">• 特别适合 X / 访谈 / 播客这种“人驱动”的内容。</tspan>
    <tspan x="132" dy="24">• 中央维护白名单，你不用自己追每个 builder。</tspan>
    <tspan x="132" dy="24">• 它给我们的是“已经筛过一次的上游输入”。</tspan>
  </text>

  <rect x="110" y="652" width="610" height="128" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="132" y="682" class="h3">它的风险</text>
  <text x="132" y="712" class="small">
    <tspan x="132" dy="0">• 白名单如果偏了，整批结果就会偏。</tspan>
    <tspan x="132" dy="24">• 它看的是 builders 视角，不一定等于 Rosy 业务视角。</tspan>
    <tspan x="132" dy="24">• 适合做“前沿广撒网”，不适合直接决定“该不该看”。</tspan>
  </text>

  <!-- Right card -->
  <g filter="url(#shadow)">
    <rect x="880" y="290" width="720" height="520" rx="28" fill="url(#cardB)" stroke="#BFE7D4"/>
  </g>
  <rect x="910" y="320" width="240" height="32" rx="16" fill="url(#pillGreen)"/>
  <text x="932" y="342" class="chip" fill="#166534">Strategic Signal Scanner = 下游过滤器</text>
  <text x="910" y="388" class="h2">我们在做什么</text>
  <text x="910" y="426" class="body">
    <tspan x="910" dy="0">我们从 RSS / Web / Podcast / upstream feed 抓原始内容。</tspan>
    <tspan x="910" dy="28">再按 Rosy 的业务规则评分，只留下高相关、高价值的信号。</tspan>
    <tspan x="910" dy="28">重点不是“谁发了什么”，而是“这条对 Rosy 有没有用”。</tspan>
  </text>

  <rect x="910" y="520" width="610" height="110" rx="20" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="932" y="550" class="h3">我们的好处</text>
  <text x="932" y="580" class="small">
    <tspan x="932" dy="0">• 更贴业务：只看和课程、出海、组织、产品设计相关的内容。</tspan>
    <tspan x="932" dy="24">• 可定制：refresh_hours、state.json、阈值、分组都能调。</tspan>
    <tspan x="932" dy="24">• 最终输出是 scored 文件、网页和 report，不只是一个 feed。</tspan>
  </text>

  <rect x="910" y="652" width="610" height="128" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="932" y="682" class="h3">我们的风险</text>
  <text x="932" y="712" class="small">
    <tspan x="932" dy="0">• 需要自己维护 source、分组、查重和评分规则。</tspan>
    <tspan x="932" dy="24">• 维护成本更高，但换来的是更强的业务贴合度。</tspan>
    <tspan x="932" dy="24">• 如果源太多，容易噪声大，所以必须严格做阈值过滤。</tspan>
  </text>

  <!-- Middle bridge -->
  <g filter="url(#shadow)">
    <rect x="360" y="850" width="960" height="120" rx="24" fill="url(#cardC)" stroke="#F3C66A"/>
  </g>
  <text x="392" y="890" class="h2" fill="#92400E">我们为什么要借它</text>
  <text x="392" y="920" class="body">
    <tspan x="392" dy="0">因为它已经把“找到 builders”这一步做成了稳定产物，尤其擅长 X、播客、官方博客。</tspan>
    <tspan x="392" dy="26">我们不重复造轮子，只把它当成上游输入，再用自己的规则筛成 Rosy 看得懂的信号。</tspan>
  </text>

  <!-- Bottom flow -->
  <g filter="url(#shadow)">
    <rect x="80" y="1000" width="1520" height="300" rx="28" fill="#FFFFFF" stroke="#D9E2F2"/>
  </g>
  <text x="110" y="1044" class="h2">怎么借：三步接入，最后只留对 Rosy 有用的</text>

  <rect x="110" y="1080" width="450" height="180" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="152" cy="1120" r="18" fill="#1D4ED8"/>
  <text x="146" y="1126" class="chip" fill="#FFFFFF">1</text>
  <text x="182" y="1122" class="h3">订阅它的三份 feed</text>
  <text x="138" y="1162" class="small">
    <tspan x="138" dy="0">feed-x.json：Builders 的 X 动态</tspan>
    <tspan x="138" dy="24">feed-blogs.json：官方博客 / 产品更新</tspan>
    <tspan x="138" dy="24">feed-podcasts.json：访谈 / 长对谈 / 方法论</tspan>
  </text>

  <rect x="615" y="1080" width="450" height="180" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="657" cy="1120" r="18" fill="#059669"/>
  <text x="651" y="1126" class="chip" fill="#FFFFFF">2</text>
  <text x="687" y="1122" class="h3">进入我们的 upstream 组</text>
  <text x="643" y="1162" class="small">
    <tspan x="643" dy="0">先把它当成“上游前沿雷达”接进来。</tspan>
    <tspan x="643" dy="24">再由我们的 capture / dedupe / refresh 逻辑处理。</tspan>
    <tspan x="643" dy="24">不直接替代我们的系统，只补强输入面。</tspan>
  </text>

  <rect x="1120" y="1080" width="450" height="180" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="1162" cy="1120" r="18" fill="#EA580C"/>
  <text x="1156" y="1126" class="chip" fill="#FFFFFF">3</text>
  <text x="1192" y="1122" class="h3">按 Rosy 的标准做筛选</text>
  <text x="1148" y="1162" class="small">
    <tspan x="1148" dy="0">4-5 分进主视野，3 分进次重点。</tspan>
    <tspan x="1148" dy="24">1-2 分默认不显示，只落盘。</tspan>
    <tspan x="1148" dy="24">最后输出 scored 文件、网页和 report。</tspan>
  </text>

  <text x="110" y="1330" class="accent">最终分工：follow-builders 负责“发现”，Strategic Signal Scanner 负责“判断”和“呈现”。</text>
</svg>
