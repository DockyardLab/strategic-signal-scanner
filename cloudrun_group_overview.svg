<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Run 日报组切换图</title>
  <desc id="desc">展示 Cloud Run 的 RUN_GROUP 如何切换，以及各日报组的用途和主要来源。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ef"/>
      <stop offset="100%" stop-color="#eef3f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d73535"/>
      <stop offset="100%" stop-color="#f05b4f"/>
    </linearGradient>
    <style>
      .title { font: 700 44px Arial, Helvetica, sans-serif; fill: #161616; }
      .subtitle { font: 400 22px Arial, Helvetica, sans-serif; fill: #515151; }
      .label { font: 700 26px Arial, Helvetica, sans-serif; fill: #161616; }
      .body { font: 400 18px Arial, Helvetica, sans-serif; fill: #3a3a3a; }
      .small { font: 400 15px Arial, Helvetica, sans-serif; fill: #5e5e5e; }
      .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.3px; }
      .boxTitle { font: 700 24px Arial, Helvetica, sans-serif; fill: #161616; }
      .boxText { font: 400 18px Arial, Helvetica, sans-serif; fill: #303030; }
      .muted { fill: #6b6b6b; }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="1200" rx="0" fill="url(#bg)"/>

  <text x="80" y="88" class="title">Cloud Run 日报组切换图</text>
  <text x="80" y="126" class="subtitle">通过 RUN_GROUP 切换不同信息源组合。线上默认是 cloudrun，实际映射到 balanced。</text>

  <rect x="80" y="170" width="1440" height="120" rx="22" fill="#ffffff" stroke="#dfdfdf"/>
  <rect x="110" y="205" width="210" height="48" rx="24" fill="url(#accent)"/>
  <text x="215" y="236" text-anchor="middle" class="chip">RUN_GROUP=cloudrun</text>
  <text x="350" y="223" class="boxTitle">默认日报入口</text>
  <text x="350" y="256" class="boxText">当前 cloudrun → balanced，适合定时日报：稳定、均衡、低噪音。</text>

  <line x1="800" y1="290" x2="800" y2="360" stroke="#c4c4c4" stroke-width="4"/>
  <circle cx="800" cy="360" r="7" fill="#d73535"/>

  <text x="80" y="355" class="label">四个最常用的日报层</text>

  <!-- Top row -->
  <rect x="80" y="390" width="340" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="110" y="418" width="110" height="34" rx="17" fill="#2c7be5"/>
  <text x="165" y="441" text-anchor="middle" class="chip">balanced</text>
  <text x="110" y="488" class="boxTitle">平衡日报</text>
  <text x="110" y="523" class="boxText">Google / NVIDIA / a16z /</text>
  <text x="110" y="547" class="boxText">Sequoia / Follow Builders /</text>
  <text x="110" y="571" class="boxText">Simon / Dwarkesh / Geoffrey</text>

  <rect x="470" y="390" width="340" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="500" y="418" width="140" height="34" rx="17" fill="#2c7be5"/>
  <text x="570" y="441" text-anchor="middle" class="chip">balanced_plus</text>
  <text x="500" y="488" class="boxTitle">更丰富一点</text>
  <text x="500" y="523" class="boxText">在 balanced 上加入</text>
  <text x="500" y="547" class="boxText">Hacker News / YC / AI Builders /</text>
  <text x="500" y="571" class="boxText">Lex / Lenny / Cat Wu / Lulu</text>

  <rect x="860" y="390" width="340" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="890" y="418" width="170" height="34" rx="17" fill="#15a06f"/>
  <text x="975" y="441" text-anchor="middle" class="chip">ai_native_product</text>
  <text x="890" y="488" class="boxTitle">AI Native Product</text>
  <text x="890" y="523" class="boxText">Anthropic / Claude / Amanda /</text>
  <text x="890" y="547" class="boxText">Cat Wu / Dario / Anthropic AI /</text>
  <text x="890" y="571" class="boxText">Lenny / Lex / Lenny's Newsletter</text>

  <rect x="1250" y="390" width="270" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="1280" y="418" width="105" height="34" rx="17" fill="#f39c12"/>
  <text x="1332" y="441" text-anchor="middle" class="chip">fast</text>
  <text x="1280" y="488" class="boxTitle">快速扫风向</text>
  <text x="1280" y="523" class="boxText">Google / NVIDIA /</text>
  <text x="1280" y="547" class="boxText">a16z / Sequoia / HN</text>

  <!-- Middle row -->
  <rect x="80" y="640" width="340" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="110" y="668" width="105" height="34" rx="17" fill="#6c757d"/>
  <text x="162" y="691" text-anchor="middle" class="chip">upstream</text>
  <text x="110" y="738" class="boxTitle">上游 detector</text>
  <text x="110" y="773" class="boxText">Follow Builders 的</text>
  <text x="110" y="797" class="boxText">X / Blog / Podcast 三条线</text>
  <text x="110" y="821" class="boxText">适合看上游新动向</text>

  <rect x="470" y="640" width="340" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="500" y="668" width="95" height="34" rx="17" fill="#d73535"/>
  <text x="547" y="691" text-anchor="middle" class="chip">front</text>
  <text x="500" y="738" class="boxTitle">置顶人物 / 官方</text>
  <text x="500" y="773" class="boxText">Paul Graham / Google Labs /</text>
  <text x="500" y="797" class="boxText">Claude / Amanda / Anthropic /</text>
  <text x="500" y="821" class="boxText">Andrej / AI Builders</text>

  <rect x="860" y="640" width="340" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="890" y="668" width="145" height="34" rx="17" fill="#9b59b6"/>
  <text x="962" y="691" text-anchor="middle" class="chip">youtube_front</text>
  <text x="890" y="738" class="boxTitle">置顶 YouTube</text>
  <text x="890" y="773" class="boxText">Sequoia / Google DeepMind /</text>
  <text x="890" y="797" class="boxText">Andrej / YC / Claude</text>
  <text x="890" y="821" class="boxText">适合看视频表达和访谈</text>

  <rect x="1250" y="640" width="270" height="210" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="1280" y="668" width="135" height="34" rx="17" fill="#8e5d3f"/>
  <text x="1348" y="691" text-anchor="middle" class="chip">podcasts</text>
  <text x="1280" y="738" class="boxTitle">播客组</text>
  <text x="1280" y="773" class="boxText">RSS：Latent Space /</text>
  <text x="1280" y="797" class="boxText">No Priors / Lex / MAD</text>
  <text x="1280" y="821" class="boxText">Web：Training Data / Lenny</text>

  <!-- Bottom row -->
  <rect x="80" y="890" width="520" height="220" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="110" y="918" width="85" height="34" rx="17" fill="#17a2b8"/>
  <text x="152" y="941" text-anchor="middle" class="chip">slow</text>
  <text x="110" y="990" class="boxTitle">慢研究</text>
  <text x="110" y="1025" class="boxText">McKinsey / AWS / AI2 / MIRI /</text>
  <text x="110" y="1049" class="boxText">fast.ai / Berkeley / MIT CSAIL /</text>
  <text x="110" y="1073" class="boxText">Every / Atlantic Tech / Lightspeed</text>

  <rect x="630" y="890" width="520" height="220" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="660" y="918" width="85" height="34" rx="17" fill="#4c6ef5"/>
  <text x="702" y="941" text-anchor="middle" class="chip">late</text>
  <text x="660" y="990" class="boxTitle">后置思想领袖</text>
  <text x="660" y="1025" class="boxText">Simon / Dwarkesh / Geoffrey /</text>
  <text x="660" y="1049" class="boxText">Mitchell / Sean / Cat / Lulu</text>
  <text x="660" y="1073" class="boxText">适合看观点、长文和作者信号</text>

  <rect x="1180" y="890" width="340" height="220" rx="24" fill="#ffffff" stroke="#e6e6e6"/>
  <rect x="1210" y="918" width="85" height="34" rx="17" fill="#d73535"/>
  <text x="1252" y="941" text-anchor="middle" class="chip">all</text>
  <text x="1210" y="990" class="boxTitle">全量合集</text>
  <text x="1210" y="1025" class="boxText">所有源一次性全看。</text>
  <text x="1210" y="1049" class="boxText">适合临时排查，不建议日常推送。</text>
  <text x="1210" y="1073" class="boxText muted">日常建议仍以 cloudrun / balanced 为主。</text>
  
  <text x="80" y="1160" class="small">切换口诀：cloudrun = 默认日报，balanced = 稳定日读，balanced_plus = 更丰富一点，ai_native_product = Anthropic / Claude / Lenny 重点组。</text>
</svg>
